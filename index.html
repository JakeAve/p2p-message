<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Ephemeral chat</title>
    <link
      rel="icon"
      id="favicon"
      type="image/svg+xml"
      href="/favicons/default.svg"
    >
    <link rel="stylesheet" href="/styles.css">
    <script>
      // Theme CSS and favicon are lazy: load only the saved theme before
      // first paint. The id pattern must match THEME_ROUTE/FAVICON_ROUTE in
      // server/static.ts.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t && t !== "default" && /^[a-z0-9-]{1,32}$/.test(t)) {
            document.documentElement.dataset.theme = t;
            document.write(
              '<link rel="stylesheet" href="/themes/' + t +
                '.css" data-theme-css="' + t + '">',
            );
            document.getElementById("favicon").href = "/favicons/" + t +
              ".svg";
          }
        } catch (_) {
          // Storage unavailable — the default theme needs no extra CSS.
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
