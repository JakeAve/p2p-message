<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 800px;
        height: 600px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        background: #667eea;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 24px;
        font-weight: 600;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff4444;
        animation: pulse 2s infinite;
      }

      .status-dot.connected {
        background: #4ade80;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.5;
        }
      }

      .join-section {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      .join-section.hidden {
        display: none;
      }

      .input-group {
        width: 100%;
        max-width: 400px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #374151;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.2s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn {
        padding: 12px 32px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn:hover {
        background: #5568d3;
      }

      .btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .chat-section {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .chat-section.active {
        display: flex;
      }

      .peers-bar {
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
        padding: 12px 20px;
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 14px;
        color: #6b7280;
      }

      .peer-badge {
        background: #667eea;
        color: white;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f9fafb;
      }

      .message {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        word-wrap: break-word;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.received {
        background: white;
        align-self: flex-start;
        border: 1px solid #e5e7eb;
      }

      .message.sent {
        background: #667eea;
        color: white;
        align-self: flex-end;
      }

      .message.system {
        background: #fef3c7;
        color: #92400e;
        align-self: center;
        font-size: 13px;
        max-width: 90%;
        text-align: center;
      }

      .message-sender {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 4px;
        opacity: 0.7;
      }

      .message-content {
        line-height: 1.5;
      }

      .input-area {
        padding: 16px 20px;
        background: white;
        border-top: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .input-row {
        display: flex;
        gap: 12px;
      }

      .input-row input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.2s;
      }

      .input-row input:focus {
        outline: none;
        border-color: #667eea;
      }

      .input-row button {
        padding: 12px 24px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .input-row button:hover:not(:disabled) {
        background: #5568d3;
      }

      .input-row button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .input-row button.secondary {
        background: white;
        color: #667eea;
        border: 2px solid #667eea;
        padding: 10px 16px;
        font-size: 13px;
      }

      .input-row button.secondary:hover:not(:disabled) {
        background: #f5f3ff;
      }

      .room-info {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1>P2P Chat</h1>
          <div class="room-info" id="room-info"></div>
        </div>
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Disconnected</span>
        </div>
      </div>

      <div class="join-section" id="join-section">
        <div class="input-group">
          <label for="display-name">Display Name</label>
          <input
            type="text"
            id="display-name"
            placeholder="Enter your name"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <label for="room-id">Room ID</label>
          <input
            type="text"
            id="room-id"
            placeholder="Enter a room name (e.g., my-room-123)"
            autocomplete="off"
          />
        </div>
        <button class="btn" id="join-btn">Join Room</button>
      </div>

      <div class="chat-section" id="chat-section">
        <div class="peers-bar">
          <span>Connected peers:</span>
          <div id="peers-list"></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <div class="input-row">
            <input
              type="text"
              id="message-input"
              placeholder="Type a message..."
              autocomplete="off"
            />
            <button id="send-btn">Send</button>
          </div>
          <!-- <div class="input-row">
            <input
              type="text"
              id="new-name-input"
              placeholder="Update your display name..."
              autocomplete="off"
            />
            <button class="secondary" id="update-name-btn">Update Name</button>
          </div> -->
        </div>
      </div>
    </div>

    <script type="module" src="/app.ts"></script>
  </body>
</html>
